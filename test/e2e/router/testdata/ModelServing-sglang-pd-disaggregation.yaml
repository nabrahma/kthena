apiVersion: workload.serving.volcano.sh/v1alpha1
kind: ModelServing
metadata:
  name: deepseek-r1-1-5b-sglang-pd
  namespace: default
spec:
  schedulerName: volcano
  replicas: 1
  template:
    roles:
      - name: prefill
        replicas: 1
        entryTemplate:
          spec:
            containers:
              - name: leader
                image: ghcr.io/faust-benchou/sglang-inference-sim:0.1.1
                imagePullPolicy: IfNotPresent
                args:
                  - "--port=30000"
                  - "--model=$(MODEL_NAME)"
                  - "--disaggregation-mode=prefill"
                env:
                  - name: MODEL_NAME
                    value: "deepseek-ai/DeepSeek-R1-Distill-Qwen-1.5B"
                ports:
                  - containerPort: 30000
        workerReplicas: 0
      - name: decode
        replicas: 1
        entryTemplate:
          spec:
            containers:
              - name: leader
                image: ghcr.io/faust-benchou/sglang-inference-sim:0.1.1
                imagePullPolicy: IfNotPresent
                args:
                  - "--port=30000"
                  - "--model=$(MODEL_NAME)"
                  - "--disaggregation-mode=decode"
                env:
                  - name: MODEL_NAME
                    value: "deepseek-ai/DeepSeek-R1-Distill-Qwen-1.5B"
                ports:
                  - containerPort: 30000
        workerReplicas: 0
